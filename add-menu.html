<!DOCTYPE html>
<html lang="bg">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Добавяне на ястие</title>

<link rel="stylesheet" href="add-menu.css">

</head>


<body>

<header>

    <div class="logo">
        <a href="index.html">
            Училищно меню
        </a>
    </div>


    <div class="profile">
        👨‍🍳 Кухня
    </div>


    <button id="themeBtn">
        🌙
    </button>

</header>



<main>


<h1>
    Добавяне на ястие
</h1>



<section class="dashboard">


<!-- ДЕН -->
<div class="card">

<h2>
📅 Ден
</h2>


<button class="day active">
Понеделник
</button>

<button class="day">
Вторник
</button>

<button class="day">
Сряда
</button>

<button class="day">
Четвъртък
</button>

<button class="day">
Петък
</button>


</div>





<!-- ФОРМА -->

<div class="card add">


<h2>
🍽 Ново ястие
</h2>


<label>
Име
</label>

<input 
type="text"
placeholder="Напр. Пиле с ориз">



<label>
Описание
</label>

<textarea
placeholder="Описание на ястието">
</textarea>



<div class="row">

<div>

<label>
Количество (g)
</label>

<input type="number">

</div>


<div>

<label>
Цена
</label>

<input type="number">

</div>

</div>



<label>
Алергени
</label>

<select>

<option>
Няма
</option>

<option>
Глутен
</option>

<option>
Мляко
</option>

<option>
Яйца
</option>

<option>
Ядки
</option>

</select>



<button class="add-btn">
+ Добави
</button>



</div>






<!-- КАТЕГОРИЯ -->

<div class="card">


<h2>
🥘 Тип храна
</h2>



<button class="food active">
🥐 Закуска
</button>


<button class="food">
🍲 Супи
</button>


<button class="food">
🍛 Основно
</button>


<button class="food">
🥗 Салати
</button>


<button class="food">
🍰 Десерти
</button>


<button class="food">
🥤 Напитки
</button>



</div>


</section>






<section class="menu-list">


<h2>
Меню за Понеделник
</h2>



<div class="item">


<div>
<h3>
Пиле с ориз
</h3>

<p>
Основно • 450g • 5.00 лв.
</p>

</div>


<div>

<button>
✏
</button>

<button>
🗑
</button>

</div>


</div>



</section>



</main>



<script src="add-menu.js"></script>


</body>

</html>
