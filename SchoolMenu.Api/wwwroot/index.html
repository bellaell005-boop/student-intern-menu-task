<!DOCTYPE html>
<html lang="bg">
<head>

  <!-- viewport = страницата да изглежда добре и на телефон -->

  <title>Дневно меню</title>
  <link rel="stylesheet" href="css/style.css">
</head>

  <main>

    <!-- Навигация между дните на седмицата (Задача 2 - готово) -->

      <button id="btn-monday">Пон</button>
      <button id="btn-tuesday">Вт</button>
      <button id="btn-wednesday">Ср</button>
      <button id="btn-thursday">Чет</button>
      <button id="btn-friday">Пет</button>

    <!-- Тук student.js "рисува" менюто -->
    <div id="menu-container">Зареждане...</div>

  <!-- Редът е важен: първо api.js (функциите), после student.js (ползва ги) -->
