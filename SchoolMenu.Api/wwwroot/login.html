<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Дневно меню</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="login-box">
    <h1>🔐 Вход</h1>

    <!-- Подсказка за тестване - махни я преди реално ползване! -->
    <p class="hint">
      Тестови акаунти (вход с имейл): kitchen@school.bg / kitchen123
      &middot; canteen@school.bg / canteen123
      <br>Учениците НЕ влизат с акаунт - менюто се вижда направо от началната страница.
    </p>

    <form id="login-form">
      <input id="username" type="email" placeholder="Имейл, напр. kitchen@school.bg" required>
      <input id="password" type="password" placeholder="Парола" required>
      <button type="submit">Влез</button>
      <!-- Тук се показва съобщение при грешен вход -->
      <div id="error" class="error"></div>
    </form>

    <a href="index.html">← Обратно към менюто</a>
  </main>

  <script src="js/api.js"></script>
  <script>
    // Логиката на входа е кратка, затова е директно тук.
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();   // спри презареждането на страницата

      try {
        const user = await login(              // функцията е в api.js
          document.getElementById("username").value,
          document.getElementById("password").value
        );

        // Пренасочваме според ролята:
        // кухнята -> админ панела, всички останали -> менюто
        // (ролята идва от базата с главна буква, напр. "Kitchen" -
        //  затова сравняваме без значение на регистъра)
        window.location.href =
          (user.role || "").toLowerCase() === "kitchen" ? "admin.html" : "index.html";
      } catch (err) {
        // Сървърът върна грешка, напр. "Грешно потребителско име или парола"
        document.getElementById("error").textContent = err.message;
      }
    });
  </script>
</body>
</html>
