<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кухня | Админ панел</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>👩‍🍳 Кухня — админ панел</h1>
    <div class="header-right">
      <!-- Потребителското име се попълва от admin.js -->
      <span id="who"></span>
      <button id="btn-logout">Изход</button>
    </div>
  </header>

  <main>

    <!-- ====================================================
         СЕКЦИЯ 1: Дневно меню - създава се ПЪРВО, за да имаш
         ID, към което да добавяш ястия в секция 2.
         ==================================================== -->
    <section class="panel">
      <h2>Дневно меню</h2>

      <form id="menu-form">
        <input id="menu-date-input" type="date" required>
        <textarea id="menu-notes" rows="2" placeholder="Бележки (по желание), напр. Вегетарианско меню"></textarea>
        <button type="submit">Публикувай меню</button>
      </form>
    </section>

    <!-- ====================================================
         СЕКЦИЯ 2: Ястия (РАБОТЕЩ ПРИМЕР за запис в базата)
         ==================================================== -->
    <section class="panel">
      <h2>Ястия</h2>

      <!-- Списъкът се пълни от admin.js -> loadItems() -->
      <ul id="items-list"></ul>

      <h3>Добави ново ястие</h3>
      <form id="item-form">
        <input id="item-menu" type="number" min="1" placeholder="ID на меню (виж по-горе)" required>

        <select id="item-category" required>
          <!-- Опциите се пълнят от admin.js -> loadCategories() -->
        </select>

        <input id="item-name" placeholder="Име, напр. Леща чорба" required>

        <select id="item-type">
          <option value="soup">🍲 Супа</option>
          <option value="main">🍛 Основно</option>
          <option value="salad">🥗 Салата</option>
          <option value="dessert">🍰 Десерт</option>
          <option value="drink">🥤 Напитка</option>
        </select>

        <input id="item-description" placeholder="Описание (по желание)">
        <input id="item-allergens" placeholder="Алергени, напр. глутен, мляко (по желание)">
        <input id="item-ingredients" placeholder="Съставки (по желание)">
        <input id="item-quantity" placeholder="Брой/обем, напр. 350 мл">
        <input id="item-weight" placeholder="Грамаж, напр. 400 г">

        <button type="submit">Добави ястие</button>
      </form>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
